<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practical 03 — Grading System</title>
  <link rel="stylesheet" href="../shared/shared.css">
  <style>
    :root {
      --accent: #E85D3A;
      --accent-soft: #FFF2DB;
      --bg-page: #FFFAF3;
    }
    .subject-entry { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 10px; }
    .subject-entry .form-group { margin-bottom: 0; }
    .subject-entry .form-group:first-child { flex: 2; }
    .subject-entry .form-group:nth-child(2) { flex: 1; }
    .subject-entry .remove-sub { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 1.2rem; padding: 8px; }
    .result-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; display: none; }
    .result-card.show { display: block; animation: fadeIn 0.35s ease; }
    .result-header { text-align: center; margin-bottom: 20px; }
    .result-header .grade-circle { width: 80px; height: 80px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 8px; }
    .subject-result { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .subject-result:last-child { border-bottom: none; }
    .subject-result .name { flex: 1; font-weight: 500; font-size: 0.9rem; }
    .subject-result .marks { font-weight: 600; font-size: 0.88rem; min-width: 60px; text-align: right; }
    .subject-result .bar-wrap { flex: 2; }
    .subject-result .status-badge { min-width: 50px; text-align: center; }
    .gpa-display { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 16px; }
    .summary-item { text-align: center; padding: 14px; background: var(--bg-input); border-radius: var(--radius-sm); }
    .summary-item .label { font-size: 0.72rem; text-transform: uppercase; color: var(--text-muted); font-weight: 600; letter-spacing: 0.4px; }
    .summary-item .val { font-size: 1.2rem; font-weight: 700; margin-top: 4px; }
    .workspace-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; align-items: start; }
    @media (max-width: 768px) { .workspace-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div class="page-wrapper">
    <header class="page-header">
      <span class="badge">Practical 03</span>
      <h1>Student Grading System</h1>
      <p>Using control structures (if-else, switch, loops) and form validation to calculate grades.</p>
    </header>

    <div class="workspace-grid">
      <!-- Left Column: Inputs -->
      <div class="left-col">
        <!-- Student Info -->
        <div class="card">
          <div class="card-title"><span class="icon">🎓</span> Student Information</div>
          <div class="form-group">
            <label for="studentName">Student Name</label>
            <input class="input" id="studentName" type="text" placeholder="e.g. Kaustubh Kachole">
          </div>
        </div>

        <!-- Subjects -->
        <div class="card">
          <div class="card-title"><span class="icon">📚</span> Subjects & Marks (out of 100)</div>
          <div id="subjectList">
            <div class="subject-entry">
              <div class="form-group"><label>Subject</label><input class="input" placeholder="e.g. Mathematics" value="Mathematics"></div>
              <div class="form-group"><label>Marks</label><input class="input" type="number" min="0" max="100" placeholder="0-100"></div>
              <button class="remove-sub" title="Remove">✕</button>
            </div>
            <div class="subject-entry">
              <div class="form-group"><label>Subject</label><input class="input" placeholder="e.g. Science" value="Science"></div>
              <div class="form-group"><label>Marks</label><input class="input" type="number" min="0" max="100" placeholder="0-100"></div>
              <button class="remove-sub" title="Remove">✕</button>
            </div>
            <div class="subject-entry">
              <div class="form-group"><label>Subject</label><input class="input" placeholder="e.g. English" value="English"></div>
              <div class="form-group"><label>Marks</label><input class="input" type="number" min="0" max="100" placeholder="0-100"></div>
              <button class="remove-sub" title="Remove">✕</button>
            </div>
          </div>
          <div class="flex gap-sm mt-1">
            <button class="btn btn-secondary btn-sm" id="btnAddSubject">+ Add Subject</button>
            <button class="btn btn-primary" id="btnCalculate">Calculate Grade</button>
          </div>
        </div>
      </div>

      <!-- Right Column: Results -->
      <div class="right-col">
        <div class="result-card" id="resultCard">
          <div class="result-header">
            <div class="grade-circle" id="gradeCircle">A</div>
            <h2 id="resultName">Student</h2>
          </div>
          <div class="summary-grid">
            <div class="summary-item"><div class="label">Percentage</div><div class="val" id="resultPct">0%</div></div>
            <div class="summary-item"><div class="label">GPA (10)</div><div class="val" id="resultGpa">0.0</div></div>
            <div class="summary-item"><div class="label">Status</div><div class="val" id="resultStatus">-</div></div>
          </div>
          <h3 style="margin: 20px 0 10px; font-size: 0.95rem;">Subject-wise Breakdown</h3>
          <div id="subjectResults"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
