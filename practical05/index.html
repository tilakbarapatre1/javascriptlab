<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Practical 05 — Cart Calculator</title>
  <link rel="stylesheet" href="../shared/shared.css">
  <style>
    :root {
      --accent: #34908B;
      --accent-soft: #E6F7F5;
      --bg-page: #F5FAFA;
    }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
    .product-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 18px; text-align: center; transition: transform 0.2s, box-shadow 0.2s; }
    .product-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .product-card .emoji { font-size: 2.2rem; margin-bottom: 8px; }
    .product-card .name { font-weight: 600; font-size: 0.9rem; margin-bottom: 2px; }
    .product-card .price { color: var(--accent); font-weight: 700; font-size: 0.95rem; margin-bottom: 10px; }
    .qty-control { display: inline-flex; align-items: center; gap: 0; border: 1px solid var(--border); border-radius: var(--radius-xs); overflow: hidden; }
    .qty-control button { width: 30px; height: 30px; border: none; background: var(--bg-input); cursor: pointer; font-size: 1rem; font-weight: 700; color: var(--text-primary); }
    .qty-control button:hover { background: var(--border); }
    .qty-control span { width: 32px; text-align: center; font-size: 0.88rem; font-weight: 600; background: var(--bg-card); }
    .totals-card { background: var(--accent-soft); border: 1px solid #C5E8E5; border-radius: var(--radius); padding: 20px; }
    .totals-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.9rem; }
    .totals-row.grand { font-size: 1.15rem; font-weight: 700; color: var(--accent); border-top: 2px solid #B0DBD8; padding-top: 10px; margin-top: 4px; }
    .discount-info { display: inline-block; background: #FEF3C7; color: #92400E; font-size: 0.75rem; padding: 3px 10px; border-radius: 999px; font-weight: 600; margin-top: 6px; }
  </style>
</head>
<body>

  <div class="page-wrapper">
    <header class="page-header">
      <span class="badge">Practical 05</span>
      <h1>Shopping Cart Calculator</h1>
      <p>Using array methods (map, filter, reduce) and object handling to build a cart with tiered discounts.</p>
    </header>

    <!-- Products -->
    <div class="card">
      <div class="card-title"><span class="icon">🏪</span> Products</div>
      <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- Cart -->
    <div class="card">
      <div class="card-title flex justify-between items-center">
        <span><span class="icon">🛒</span> Your Cart</span>
        <span class="status-badge" id="cartCount" style="background: var(--accent-soft); color: var(--accent);">0 items</span>
      </div>
      <div class="table-wrap" id="cartTableWrap" style="display:none;">
        <table>
          <thead><tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th><th></th></tr></thead>
          <tbody id="cartBody"></tbody>
        </table>
      </div>
      <div class="empty-state" id="cartEmpty">
        <div class="empty-icon">🛒</div>
        <p>Your cart is empty. Add items from above!</p>
      </div>
    </div>

    <!-- Totals -->
    <div class="totals-card" id="totalsCard" style="display:none;">
      <div class="totals-row"><span>Subtotal</span><span id="subtotalVal">₹0</span></div>
      <div class="totals-row" id="discountRow" style="display:none;"><span>Discount (<span id="discPct">0</span>%)</span><span id="discVal">-₹0</span></div>
      <div class="totals-row grand"><span>Grand Total</span><span id="grandTotal">₹0</span></div>
      <div id="discountBadge"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
